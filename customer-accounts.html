<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý tài khoản khách hàng | DentalCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="customer-accounts.css">
</head>

<body>
    <div class="container">
        <div class="header-card">
            <div class="title-section">
                <i class="fas fa-users"></i>
                <div>
                    <h2>Quản lý tài khoản khách hàng</h2>
                    <p>Thêm, sửa, xóa và tìm kiếm thông tin khách hàng</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="stats-badge">
                    <i class="fas fa-user-check"></i>
                    <span id="totalCount">0</span> khách hàng
                </div>
                <button class="btn-exit" id="exitBtn"><i class="fas fa-sign-out-alt"></i> Thoát</button>
            </div>
        </div>

        <div class="toolbar">
            <button class="btn-primary" id="openAddModalBtn"><i class="fas fa-plus-circle"></i> Thêm khách hàng</button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm theo tên, email, SĐT...">
            </div>
        </div>

        <div class="table-wrapper">
            <table class="customer-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Địa chỉ</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <!-- Dữ liệu sẽ được render bằng JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal thêm / sửa khách hàng -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-user-plus"></i> Thêm khách hàng</h3>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <form id="customerForm">
                <input type="hidden" id="editId" value="">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Họ tên *</label>
                    <input type="text" id="fullName" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email *</label>
                    <input type="email" id="email" placeholder="customer@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Số điện thoại *</label>
                    <input type="tel" id="phone" placeholder="0901234567" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
                    <input type="text" id="address" placeholder="Số nhà, đường, thành phố">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-toggle-on"></i> Trạng thái</label>
                    <select id="status">
                    <option value="active">Hoạt động</option>
                    <option value="inactive">Khóa</option>
                </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelModalBtn">Hủy bỏ</button>
                    <button type="submit" class="btn-save"><i class="fas fa-save"></i> Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <script src="customer-accounts.js"></script>
</body>

</html>

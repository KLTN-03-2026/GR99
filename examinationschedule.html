<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đặt Lịch Khám</title>
    <link rel="stylesheet" href="./examinationschedule.css">
</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left">
            <h1>Đặt lịch hẹn trực tuyến</h1>
            <p>Vui lòng điền thông tin, chúng tôi sẽ liên hệ sớm nhất.</p>

            <!-- Chọn bệnh nhân -->
            <div class="form-group">
                <label>Chọn bệnh nhân <span style="color: #999; font-size: 0.85em;">(hoặc nhập thông tin
                        mới)</span></label>
                <select id="patientSelect">
                    <option value="">-- Chọn bệnh nhân từ danh sách --</option>
                </select>
            </div>

            <!-- Họ tên + SĐT -->
            <!-- Họ tên + Tuổi -->
            <div class="row">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" id="name" placeholder="Nguyễn Văn A">
                </div>

                <div class="form-group">
                    <label>Tuổi</label>
                    <input type="number" id="age" placeholder="20">
                </div>
            </div>

            <!-- Giới tính + SĐT -->
            <div class="row">
                <div class="form-group">
                    <label>Giới tính</label>
                    <select id="gender">
                        <option value="">-- Chọn giới tính --</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" id="phone" placeholder="0901234567">
                </div>
            </div>

            <!-- Địa chỉ -->
            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" id="address" placeholder="23 Ngô Quyền Đà Nẵng">
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label>Dịch vụ quan tâm</label>
                <select id="service">
                    <option value="">-- Chọn dịch vụ --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Bác sĩ</label>
                <select id="doctor">
                    <option value="">-- Chọn bác sĩ --</option>
                </select>
            </div>


            <div class="row">
                <div class="form-group">
                    <label>Ngày hẹn</label>
                    <input type="date" id="date">
                    <span class="error" id="errorDate"></span>
                </div>

                <div class="form-group">
                    <label>Khung giờ</label>
                    <select id="time">
                        <option value="08:00">08:00 - 09:00</option>
                        <option value="09:00">09:00 - 10:00</option>
                        <option value="10:00">10:00 - 11:00</option>
                        <option value="11:00">11:00 - 12:00</option>
                        <option value="12:00">12:00 - 13:00</option>
                        <option value="13:00">13:00 - 14:00</option>
                        <option value="14:00">14:00 - 15:00</option>
                        <option value="15:00">15:00 - 16:00</option>
                        <option value="16:00">16:00 - 17:00</option>
                        <option value="17:00">17:00 - 18:00</option>
                    </select>
                </div>
            </div>


            <div class="form-group">
                <label>Ghi chú</label>
                <textarea id="note" placeholder="Mô tả tình trạng..."></textarea>
            </div>

            <!-- BUTTON -->
            <div class="btn-group">
                <button class="btn-submit" onclick="submitForm()">
                    Gửi yêu cầu đặt lịch
                </button>

                <button class="btn-back" onclick="goHome()">
                    ← Thoát
                </button>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right" id="mapSection">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1918747.648581863!2d107.24333443218647!3d14.804720381694457!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x314219c792252a13%3A0xfc14e3a044436487!2zxJDDoCBO4bq1bmcsIEjhuqNpIENow6J1LCDEkMOgIE7hurVuZywgVmnhu4d0IE5hbQ!5e0!3m2!1svi!2s!4v1775208539525!5m2!1svi!2s"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            <div class="info">
                <p><strong>Địa chỉ</strong><br>45 Phạm Văn Bạch, Quận Hải Châu</p>
                <p><strong>Hotline</strong><br>1900 8888</p>
                <p><strong>Giờ làm việc</strong><br>08:00 - 20:00</p>
            </div>

            <div class="support">
                <h3>Bạn cần hỗ trợ?</h3>
                <button>Chat Zalo</button>
                <button>Facebook</button>
            </div>
        </div>



    </div>

    <script src="./examinationschedule.js"></script>
</body>

</html>

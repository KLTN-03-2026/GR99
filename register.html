<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Nha khoa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">
        <div class="logo-icon-dental"><i class="fas fa-user-plus"></i></div>
        <h1>Đăng ký bệnh nhân</h1>
        <p class="subtitle">Tạo tài khoản để đặt lịch khám nha khoa</p>

        <div class="input-group">
            <label><i class="fas fa-user"></i> Họ tên</label>
            <input type="text" id="regFullname" placeholder="Họ và tên">
        </div>
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="regEmail" placeholder="Email">
        </div>
        <div class="input-group">
            <label><i class="fas fa-phone"></i> Số điện thoại</label>
            <input type="text" id="regPhone" placeholder="Số điện thoại">
        </div>
        <div class="input-group">
            <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
            <input type="text" id="regAddress" placeholder="Địa chỉ">
        </div>
        <div class="input-group">
            <label><i class="fas fa-user-circle"></i> Tên đăng nhập</label>
            <input type="text" id="regUser" placeholder="Chọn tên đăng nhập">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Mật khẩu</label>
            <input type="password" id="regPass" placeholder="Mật khẩu">
        </div>
        <div class="input-group">
            <label><i class="fas fa-check-circle"></i> Xác nhận mật khẩu</label>
            <input type="password" id="regRePass" placeholder="Nhập lại mật khẩu">
        </div>

        <div class="btn-login"><button onclick="register()">ĐĂNG KÝ</button></div>

        <div class="switch">
            <span>Đã có tài khoản? </span>
            <a href="login.html">Đăng nhập</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>

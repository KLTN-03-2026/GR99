<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hồ sơ khám bệnh | AURA SMILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="patientrecords.css">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <i class="fas fa-notes-medical"></i>
                <h1>Hồ sơ khám bệnh</h1>
            </div>
            <div class="header-actions">
                <a href="./dashboard.html" class="home-link">
                    <i class="fas fa-home"></i> Thoát
                </a>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- Danh sách lịch khám -->
            <div class="card appointment-card">
                <div class="card-header">
                    <i class="fas fa-calendar-check"></i>
                    <h2>Danh sách lịch khám</h2>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="appointmentTable">
                        <thead>
                            <tr>
                                <th>Họ tên</th>
                                <th>SĐT</th>
                                <th>Email</th>
                                <th>Bác sĩ</th>
                                <th>Ngày khám</th>
                                <th>Khung giờ</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="tableData">
                            <tr class="empty-row">
                                <td colspan="7">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Thông tin bệnh nhân được chọn -->
            <div class="card info-card" id="infoCard" style="display: none;">
                <div class="card-header">
                    <i class="fas fa-user-circle"></i>
                    <h2>Thông tin bệnh nhân</h2>
                </div>
                <div class="info-content">
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-user"></i> Bệnh nhân:</span>
                        <span class="info-value" id="patientName"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-calendar-day"></i> Ngày khám:</span>
                        <span class="info-value" id="date"></span>
                    </div>
                </div>
            </div>

            <!-- Form nhập hồ sơ -->
            <div class="card record-card">
                <div class="card-header">
                    <i class="fas fa-file-medical"></i>
                    <h2>Nhập hồ sơ khám</h2>
                </div>
                <div class="record-form">
                    <div class="form-group">
                        <label><i class="fas fa-head-side-medical"></i> Triệu chứng</label>
                        <textarea id="symptom" rows="3" placeholder="Mô tả triệu chứng bệnh nhân..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-stethoscope"></i> Chẩn đoán</label>
                        <textarea id="diagnosis" rows="3" placeholder="Chẩn đoán bệnh..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-prescription-bottle"></i> Phương pháp điều trị</label>
                        <textarea id="treatment" rows="3" placeholder="Phác đồ điều trị / hướng dẫn..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button id="saveBtn" class="btn-primary">
                            <i class="fas fa-save"></i> Lưu hồ sơ
                        </button>
                        <button id="clearBtn" class="btn-secondary">
                            <i class="fas fa-eraser"></i> Làm mới
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-message"></div>

    <script src="patientrecords.js"></script>
</body>

</html>

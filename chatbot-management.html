<style>
  :root {
    --teal: #1a7a6e;
    --teal-dark: #145f56;
    --teal-light: #e8f5f3;
    --teal-mid: #2a9d8f;
    --text: #1c2b2a;
    --text-muted: #6b8280;
    --border: #d0e8e5;
    --bg: #f4faf9;
    --white: #ffffff;
    --shadow: 0 2px 16px rgba(26,122,110,0.10);
    --shadow-lg: 0 8px 32px rgba(26,122,110,0.15);
    --status-ai: #2a9d8f;
    --status-waiting: #e9c46a;
    --status-done: #57cc99;
  }

  .chatbot-management-wrapper {
    font-family: 'Be Vietnam Pro', sans-serif;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
  }

  .chatbot-management-wrapper * {
    box-sizing: border-box;
  }

  .page-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px; color: var(--teal-dark);
    margin-bottom: 4px;
  }
  .page-title p { color: var(--text-muted); font-size: 14px; }

  /* STATS */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--white); border-radius: 14px; padding: 20px 22px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .stat-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .stat-icon.blue { background: #e8f4fd; }
  .stat-icon.green { background: #e6f9f0; }
  .stat-icon.yellow { background: #fef9e6; }
  .stat-icon.red { background: #fdf0ec; }
  .stat-info .num { font-size: 24px; font-weight: 700; color: var(--teal-dark); line-height: 1; }
  .stat-info .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* TOOLBAR */
  .chatbot-toolbar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 220px; display: flex; align-items: center; gap: 8px;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 9px 14px; transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--teal-mid); }
  .search-box input {
    border: none; outline: none; width: 100%;
    font-family: inherit; font-size: 14px; color: var(--text); background: transparent;
  }
  .filter-select {
    padding: 9px 14px; border-radius: 10px; border: 1.5px solid var(--border);
    font-family: inherit; font-size: 14px; color: var(--text); background: var(--white);
    cursor: pointer; outline: none; transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--teal-mid); }
  .refresh-btn {
    padding: 9px 16px; border-radius: 10px; background: var(--teal); color: #fff;
    border: none; font-family: inherit; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background 0.2s;
  }
  .refresh-btn:hover { background: var(--teal-dark); }

  /* TABLE */
  .table-card {
    background: var(--white); border-radius: 16px;
    box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden;
  }
  .table-head {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-head h3 { font-size: 15px; font-weight: 600; color: var(--teal-dark); margin: 0; }
  .record-count {
    background: var(--teal-light); color: var(--teal); font-size: 12px;
    font-weight: 600; padding: 3px 10px; border-radius: 20px;
  }
  .chatbot-table { width: 100%; border-collapse: collapse; }
  .chatbot-table thead tr { background: var(--bg); }
  .chatbot-table th {
    padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border);
  }
  .chatbot-table td {
    padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f0f7f6; vertical-align: middle;
  }
  .chatbot-table tbody tr { transition: background 0.15s; cursor: pointer; }
  .chatbot-table tbody tr:hover { background: var(--teal-light); }
  
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal-mid), var(--teal-dark));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .user-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .user-handle { font-size: 12px; color: var(--text-muted); }
  .msg-preview { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; color: var(--text-muted); }
  .has-image { background: #e8f4fd; color: #1a6fa8; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .no-image { font-size: 12px; color: #c0ccc9; }
  .time-cell { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* STATUS BADGES */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .status-ai { background: #e6f7f5; color: var(--status-ai); }
  .status-ai::before { background: var(--status-ai); }
  .status-waiting { background: #fef9e6; color: #b8860b; }
  .status-waiting::before { background: var(--status-waiting); }
  .status-done { background: #e6f9f0; color: #2d8655; }
  .status-done::before { background: var(--status-done); }

  .action-btn {
    padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--white); color: var(--teal); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .action-btn:hover { background: var(--teal); color: #fff; border-color: var(--teal); }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-top: 1px solid var(--border);
  }
  .pagination-info { font-size: 13px; color: var(--text-muted); }
  .pagination-btns { display: flex; gap: 6px; }
  .page-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--white); font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--text-muted); transition: all 0.2s;
  }
  .page-btn:hover, .page-btn.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-content {
    background: var(--white); border-radius: 20px; width: 100%; max-width: 680px;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-header {
    padding: 24px 28px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1;
  }
  .modal-header h2 { font-size: 18px; font-weight: 700; color: var(--teal-dark); margin: 0; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg);
    font-size: 18px; cursor: pointer; color: var(--text-muted); transition: background 0.2s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 24px 28px; }
  
  .chat-section { margin-bottom: 20px; }
  .bubble-user { background: var(--teal-light); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; padding: 14px 16px; font-size: 14px; margin-bottom: 14px; }
  .bubble-ai { background: #f0fdf8; border: 1px solid #c3ead6; border-radius: 14px 14px 4px 14px; padding: 14px 16px; font-size: 13.5px; white-space: pre-wrap; }
  
  /* UTILS */
  .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
  .loading-spinner {
    width: 22px; height: 22px; border: 3px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast-alert {
    position: fixed; bottom: 28px; right: 28px; background: var(--teal-dark); color: #fff;
    padding: 12px 20px; border-radius: 12px; font-size: 14px; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 9999;
  }
  .toast-alert.show { transform: translateY(0); opacity: 1; }
</style>

<div class="chatbot-management-wrapper">
  <div class="page-header">
    <div class="page-title">
      <h1>Quản Lý Chatbot</h1>
      <p>Xem và xử lý các cuộc hội thoại từ người dùng với AI tư vấn nha khoa</p>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-icon blue">💬</div>
      <div class="stat-info">
        <div class="num" id="statTotal">–</div>
        <div class="label">Tổng cuộc hội thoại</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">🤖</div>
      <div class="stat-info">
        <div class="num" id="statAI">–</div>
        <div class="label">Chỉ AI trả lời</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon yellow">⏳</div>
      <div class="stat-info">
        <div class="num" id="statWaiting">–</div>
        <div class="label">Chờ đặt lịch</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">✅</div>
      <div class="stat-info">
        <div class="num" id="statDone">–</div>
        <div class="label">Đã khám xong</div>
      </div>
    </div>
  </div>

  <div class="chatbot-toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Tìm tên, username, nội dung..." oninput="applyFilters()">
    </div>
    <select class="filter-select" id="statusFilter" onchange="applyFilters()">
      <option value="">Tất cả trạng thái</option>
      <option value="ai">🤖 AI trả lời</option>
      <option value="waiting">⏳ Chờ đặt lịch</option>
      <option value="done">✅ Đã khám</option>
    </select>
    <select class="filter-select" id="imageFilter" onchange="applyFilters()">
      <option value="">Tất cả loại</option>
      <option value="image">📷 Có gửi ảnh</option>
      <option value="text">💬 Chỉ tin nhắn</option>
    </select>
    <button class="refresh-btn" onclick="loadData()">🔄 Tải lại</button>
  </div>

  <div class="table-card">
    <div class="table-head">
      <h3>Danh sách hội thoại</h3>
      <span class="record-count" id="recordCount">Đang tải...</span>
    </div>
    <div id="tableContainer">
      <div style="text-align:center; padding: 40px;"><div class="loading-spinner"></div></div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <div class="pagination-info" id="pageInfo"></div>
      <div class="pagination-btns" id="pageBtns"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeChatModal(event)">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📋 Chi tiết hội thoại</h2>
      <button class="modal-close" onclick="closeChatModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
       <div style="text-align:center; padding: 40px;"><div class="loading-spinner"></div></div>
    </div>
  </div>
</div>

<div class="toast-alert" id="toastAlert"></div>

<script>
const API_URL = 'http://localhost:3000';
let chatData = [];
let filteredChat = [];
let chatPage = 1;
const CHAT_PER_PAGE = 15;
let activeChatId = null;

async function loadData() {
  document.getElementById('tableContainer').innerHTML = '<div style="text-align:center; padding: 40px;"><div class="loading-spinner"></div></div>';
  try {
    const res = await fetch(`${API_URL}/api/doctor/results`);
    const json = await res.json();
    chatData = json.results || [];
    updateDashboardStats();
    applyFilters();
    showChatToast('✅ Đã tải ' + chatData.length + ' hội thoại');
  } catch(e) {
    document.getElementById('tableContainer').innerHTML = `<div class="empty-state"><p>⚠️ Lỗi kết nối Server: <b>${API_URL}</b></p></div>`;
    document.getElementById('recordCount').textContent = 'Lỗi kết nối';
  }
}

function updateDashboardStats() {
  document.getElementById('statTotal').textContent = chatData.length;
  document.getElementById('statAI').textContent = chatData.filter(r=>r.status==='ai').length;
  document.getElementById('statWaiting').textContent = chatData.filter(r=>r.status==='waiting').length;
  document.getElementById('statDone').textContent = chatData.filter(r=>r.status==='done').length;
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const imgF = document.getElementById('imageFilter').value;

  filteredChat = chatData.filter(r => {
    const matchQ = !q || (r.fullname||'').toLowerCase().includes(q) || (r.username||'').toLowerCase().includes(q) || (r.userMessage||'').toLowerCase().includes(q);
    const matchS = !status || r.status === status;
    const matchI = !imgF || (imgF==='image' ? r.hasImage : !r.hasImage);
    return matchQ && matchS && matchI;
  });
  chatPage = 1;
  renderChatTable();
}

function renderChatTable() {
  const total = filteredChat.length;
  document.getElementById('recordCount').textContent = total + ' kết quả';

  if (total === 0) {
    document.getElementById('tableContainer').innerHTML = `<div class="empty-state"><p>Không có hội thoại nào phù hợp</p></div>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const start = (chatPage-1)*CHAT_PER_PAGE;
  const page = filteredChat.slice(start, start+CHAT_PER_PAGE);

  let html = `<table class="chatbot-table"><thead><tr>
      <th>#</th><th>Người dùng</th><th>Nội dung tin nhắn</th><th>Ảnh</th><th>Thời gian</th><th>Trạng thái</th><th>Thao tác</th>
    </tr></thead><tbody>`;

  page.forEach((r, i) => {
    const initials = (r.fullname||r.username||'K').substring(0,1).toUpperCase();
    const statusLabel = {ai:'AI trả lời', waiting:'Chờ đặt lịch', done:'Đã khám'}[r.status]||r.status;
    html += `<tr onclick="openChatModal('${r.id}')">
      <td style="color:var(--text-muted);font-size:12px">${start+i+1}</td>
      <td><div class="user-cell"><div class="user-avatar">${initials}</div><div><div class="user-name">${escHtmlStr(r.fullname||'Khách')}</div><div class="user-handle">@${escHtmlStr(r.username||'anonymous')}</div></div></div></td>
      <td><div class="msg-preview">${escHtmlStr(r.userMessage||'(trống)')}</div></td>
      <td>${r.hasImage ? '<span class="has-image">📷 Có ảnh</span>' : '<span class="no-image">Không có</span>'}</td>
      <td class="time-cell">${formatChatDate(r.timestamp)}</td>
      <td><span class="status-badge status-${r.status}">${statusLabel}</span></td>
      <td><button class="action-btn" onclick="event.stopPropagation();openChatModal('${r.id}')">Xem</button></td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;

  // Render Pagination
  const totalPages = Math.ceil(total/CHAT_PER_PAGE);
  document.getElementById('pagination').style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('pageInfo').textContent = `Hiển thị ${start+1}–${Math.min(start+CHAT_PER_PAGE,total)} / ${total}`;

  let btns = `<button class="page-btn" onclick="goToChatPage(${chatPage-1})" ${chatPage===1?'disabled':''}>‹</button>`;
  for(let p=1;p<=totalPages;p++){
    if(p===1||p===totalPages||Math.abs(p-chatPage)<=1) btns += `<button class="page-btn ${p===chatPage?'active':''}" onclick="goToChatPage(${p})">${p}</button>`;
    else if(Math.abs(p-chatPage)===2) btns += `<button class="page-btn" disabled>…</button>`;
  }
  btns += `<button class="page-btn" onclick="goToChatPage(${chatPage+1})" ${chatPage===totalPages?'disabled':''}>›</button>`;
  document.getElementById('pageBtns').innerHTML = btns;
}

function goToChatPage(p) {
  const max = Math.ceil(filteredChat.length/CHAT_PER_PAGE);
  if(p<1||p>max) return;
  chatPage = p; renderChatTable();
}

async function openChatModal(id) {
  activeChatId = id;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalBody').innerHTML = '<div style="text-align:center; padding: 40px;"><div class="loading-spinner"></div></div>';

  try {
    const res = await fetch(`${API_URL}/api/doctor/results/${id}`);
    const r = await res.json();
    renderChatModal(r);
  } catch(e) {
    document.getElementById('modalBody').innerHTML = '<div class="empty-state"><p>Lỗi tải chi tiết</p></div>';
  }
}

function renderChatModal(r) {
  let imgHtml = (r.imageDataUrl && r.hasImage) ? `<div class="chat-section"><div style="font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:10px;">📷 Ảnh người dùng gửi</div><img src="${r.imageDataUrl}" style="max-width:300px; border-radius:8px;"></div>` : '';

  document.getElementById('modalBody').innerHTML = `
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
      <div style="background:var(--bg); border-radius:10px; padding:12px;"><b>Họ tên:</b> ${escHtmlStr(r.fullname||'Khách')}</div>
      <div style="background:var(--bg); border-radius:10px; padding:12px;"><b>Thời gian:</b> ${formatChatDate(r.timestamp)}</div>
    </div>
    ${imgHtml}
    <div class="chat-section">
      <div style="font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:10px;">👤 Người dùng hỏi</div>
      <div class="bubble-user">${escHtmlStr(r.userMessage||'(không có tin nhắn)')}</div>
    </div>
    <div class="chat-section">
      <div style="font-size:11px; color:var(--teal); font-weight:700; margin-bottom:8px;">🤖 AI Aura Smile trả lời</div>
      <div class="bubble-ai">${escHtmlStr(r.aiReply||'')}</div>
    </div>
    <div style="background:var(--bg); border-radius:12px; padding:16px; margin-top:20px;">
      <p style="font-size:13px; font-weight:600; margin-bottom:10px; color:var(--text-muted);">Cập nhật trạng thái:</p>
      <div style="display:flex; gap:8px;">
        <button class="action-btn ${r.status==='ai'?'status-ai':''}" onclick="updateChatStatus('ai')">🤖 AI trả lời</button>
        <button class="action-btn ${r.status==='waiting'?'status-waiting':''}" onclick="updateChatStatus('waiting')">⏳ Chờ đặt lịch</button>
        <button class="action-btn ${r.status==='done'?'status-done':''}" onclick="updateChatStatus('done')">✅ Đã khám xong</button>
      </div>
    </div>
  `;
}

async function updateChatStatus(newStatus) {
  if(!activeChatId) return;
  try {
    const res = await fetch(`${API_URL}/api/doctor/results/${activeChatId}/status`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({status: newStatus})
    });
    const json = await res.json();
    if(json.ok) {
      const idx = chatData.findIndex(r=>r.id===activeChatId);
      if(idx!==-1) chatData[idx].status = newStatus;
      updateDashboardStats();
      applyFilters();
      renderChatModal(json.record);
      showChatToast('✅ Đã cập nhật trạng thái thành công!');
    }
  } catch(e) {
    showChatToast('❌ Lỗi cập nhật trạng thái');
  }
}

function closeChatModal(e) { if(e.target===document.getElementById('modalOverlay')) closeChatModalBtn(); }
function closeChatModalBtn() { document.getElementById('modalOverlay').classList.remove('open'); activeChatId = null; }
function formatChatDate(ts) { return ts ? new Date(ts).toLocaleString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '–'; }
function escHtmlStr(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showChatToast(msg) {
  const t = document.getElementById('toastAlert');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// Khởi tạo
document.addEventListener('DOMContentLoaded', loadData);
</script>

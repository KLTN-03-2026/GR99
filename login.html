<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Nha khoa AURA SMILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">
        <div class="logo-icon-dental"><i class="fas fa-tooth"></i></div>
        <h1>Đăng nhập</h1>
        <p class="subtitle">Vui lòng nhập thông tin tài khoản</p>

        <div class="input-group">
            <label><i class="fas fa-user"></i> Tên đăng nhập</label>
            <input type="text" id="loginUser" placeholder="Tên đăng nhập">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Mật khẩu</label>
            <input type="password" id="loginPass" placeholder="Mật khẩu">
        </div>

        <div class="btn-login"><button onclick="login()">ĐĂNG NHẬP</button></div>

        <div class="forgot-password">
            <a href="#" onclick="openForgotPassword()">Quên mật khẩu?</a>
        </div>

        <div class="switch">
            <span>Chưa có tài khoản bệnh nhân? </span>
            <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <!-- MODAL QUÊN MẬT KHẨU -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Quên mật khẩu</h2>
                <span class="close" onclick="closeForgotPassword()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Nhập tên đăng nhập hoặc email để nhận mã khôi phục mật khẩu.</p>
                <div class="forgot-step" id="forgotStep1">
                    <label for="forgotInput">Tên đăng nhập hoặc email</label>
                    <input type="text" id="forgotInput" placeholder="Tên đăng nhập hoặc email">
                    <button class="modal-button" onclick="sendResetCode()">Gửi mã xác thực</button>
                </div>
                <div class="forgot-step hidden" id="forgotStep2">
                    <label for="resetCode">Mã xác thực</label>
                    <input type="text" id="resetCode" placeholder="Nhập mã xác thực">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" placeholder="Mật khẩu mới">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu">
                    <button class="modal-button" onclick="confirmResetPassword()">Tạo lại mật khẩu</button>
                </div>
                <p class="modal-note" id="forgotNote"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
